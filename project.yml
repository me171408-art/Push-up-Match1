name: PushUpMatch
options:
  bundleIdPrefix: com.sahabettinadiyaman
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_TEAM: WHCYV6XT76
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.sahabettinadiyaman.pushupmatch
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_NSCameraUsageDescription: "Push Up Match uses your camera to detect push-up reps on-device. No video is stored or uploaded."

targets:
  PushUpMatch:
    type: application
    platform: iOS
    sources:
      - path: PushUpMatch
        excludes:
          - Tests/**
    resources:
      - path: PushUpMatch/Resources/Assets.xcassets
      - path: PushUpMatch/Resources/Sounds
    entitlements:
      path: PushUpMatch/PushUpMatch.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: PushUpMatch/Info.plist
      properties:
        CFBundleName: PushUpMatch
        CFBundleDisplayName: Push Up Match
        UILaunchScreen:
          UIColorName: ""
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Push Up Match uses your camera to detect push-up reps on-device. No video is stored or uploaded."
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Vision.framework

  PushUpMatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PushUpMatch/Tests
    dependencies:
      - target: PushUpMatch
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PushUpMatch.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PushUpMatch"
